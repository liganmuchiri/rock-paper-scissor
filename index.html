<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissor</title>
</head>
<body>


     <button id="rock"> Rock </button>
    <button id="paper">Paper</button>
    <button id="scissor">Scissor</button>

    <div id="result"> </div>


    <script>

        console.log("Hello World");


        let humanScore = 0;

        let computerScore = 0;

        let humanChoice = 0;

        let computerChoice = 0;

        let playerName = prompt("Please enter your name: ");
      

        function getComputerChoice() {
    const randomNumber = Math.floor(Math.random() * 3);

    if (randomNumber === 0) {
        return "rock";
    } else if (randomNumber === 1) {
        return "paper";
    } else {
        return "scissors";
    }
}


         alert("Welcome to Rock, Paper, Scissors! a game played by " + playerName + " against computer" 
         + "\n" + "The game will end when either  " + playerName + " or computer reaches 5 points."
          + "\n" + "Good luck!");
        
         alert("kindly click rock, paper or scissor  to play the game" );
         


          function playGame(){
       let message = "";
    if (humanChoice === computerChoice) {
        message = "It's a tie!";
        
    } else if (humanChoice === "rock" && computerChoice === "scissors") {
        humanScore++;
        message= "You win this round.";
    } else if (humanChoice === "paper" && computerChoice === "rock") {
        humanScore++;
        message= "You win this round.";
    } else if (humanChoice === "scissors" && computerChoice === "paper") {
        humanScore++;
        message= "You win this round.";
    } else {
        computerScore++;
        message= "You lose this round.";

    }

        document.getElementById("result").innerHTML = `
        <p>${message}</p>
            <p>${playerName}: ${humanScore} |  Computer: ${computerScore}</p>`;

}

    console.log(`Human: ${humanScore}, Computer: ${computerScore}`);

    function printWinner() {
        if (humanScore === 5) {
            document.getElementById("result").innerHTML += `<p>Congratulations ${playerName}! You won the game!</p>`;
        } else if (computerScore === 5) {
            document.getElementById("result").innerHTML += "<p> Better luck next time, Computer wins!</p>";
        }
    }

    

    function checkWinner(){
        if (humanScore === 5 || computerScore === 5)
    {
        printWinner();
        document.getElementById("rock").disabled = true;
        document.getElementById("paper").disabled = true;
        document.getElementById("scissor").disabled = true;

        const playAgainButton = document.createElement("button");
        playAgainButton.textContent = "Play Again";
        playAgainButton.addEventListener("click", function() {
            location.reload();

           const footer = document.createElement("footer");
           footer.textContent = "Copyright © Ligan - Ignition Spark";
            document.body.appendChild(footer);
        });
        document.getElementById("result").appendChild(playAgainButton);

    }
    }
   

        
    document.getElementById("rock").addEventListener("click", function() {
        if (humanScore === 5 || computerScore === 5) {
            return;
    }
     humanChoice = "rock";
         computerChoice = getComputerChoice();
         playGame();
        
         checkWinner();
    });
       

    document.getElementById("paper").addEventListener("click", function() {

        if(humanScore === 5 || computerScore === 5) {
            return;
        }

         humanChoice = "paper";
         computerChoice = getComputerChoice();
         playGame();
         checkWinner();

        
    
    });
       

    document.getElementById("scissor").addEventListener("click", function() {

    if (humanScore === 5 || computerScore === 5) {
            return;
    }
         humanChoice = "scissors";
         computerChoice = getComputerChoice();
         playGame();

         checkWinner();
         

    });
    
    
          
       
    </script>


    


</body>
</html>
