<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock-paper-scissor</title>
</head>
<body>
    <script>

        console.log("Hello World");


        let humanScore = 0;

        let computerScore = 0;
      

        function getComputerChoice() {
    const randomNumber = Math.floor(Math.random() * 3);

    if (randomNumber === 0) {
        return "rock";
    } else if (randomNumber === 1) {
        return "paper";
    } else {
        return "scissors";
    }
}


        function getHumanChoice (){

        let choice = prompt ("Enter rock, paper, or scissors");
        return choice;
        }
         alert("Welcome to Rock, Paper, Scissors!  game You will play 5 rounds against the computer.");
         alert("kindly enter your choice 5 times");


          function playGame(){
        for (let i = 1; i < 5; i++) {
            const humanChoice = getHumanChoice();
            const computerChoice = getComputerChoice();

    if (humanChoice === computerChoice) {
        console.log("It's a tie!");
    } else if (humanChoice === "rock" && computerChoice === "scissors") {
        humanScore++;
        console.log("You win! Rock beats Scissors.");
    } else if (humanChoice === "paper" && computerChoice === "rock") {
        humanScore++;
        console.log("You win! Paper beats Rock.");
    } else if (humanChoice === "scissors" && computerChoice === "paper") {
        humanScore++;
        console.log("You win! Scissors beats Paper.");
    } else {
        computerScore++;
        console.log(`You lose! ${computerChoice} beats ${humanChoice}.`);
    }
}

    console.log(`Human: ${humanScore}, Computer: ${computerScore}`);
}
       
    

    function results(humanScore, computerScore) {

    if (humanScore > computerScore) {
        alert(`Human: ${humanScore}, Computer: ${computerScore}\nYou win the game!`);
    } else if (humanScore < computerScore) {
        alert(`Human: ${humanScore}, Computer: ${computerScore}\nComputer wins the game!`);
    } else {
        alert(`Human: ${humanScore}, Computer: ${computerScore}\nThe game is a tie!`);
    }
}
        playGame();
        getHumanChoice();
        getComputerChoice();
        results(humanScore, computerScore);

        
    
          
    </script>
</body>
</html>
